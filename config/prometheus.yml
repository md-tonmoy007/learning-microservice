global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    static_configs:
      - targets: ["api-gateway:8000"]
    metrics_path: /metrics

  - job_name: orchestrator
    static_configs:
      - targets: ["orchestrator:8001"]
    metrics_path: /metrics
