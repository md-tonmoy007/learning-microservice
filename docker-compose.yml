services:
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      ORCHESTRATOR_URL: http://orchestrator:8001
    depends_on:
      orchestrator:
        condition: service_healthy
    restart: on-failure

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    ports:
      - "8001:8001"
    environment:
      POSTGRES_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/research
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      PLANNER_AGENT_ADDRESS: planner-agent:50051
      SEARCH_AGENT_ADDRESS: search-agent:50052
      SUMMARIZER_AGENT_ADDRESS: summarizer-agent:50053
      CRITIC_AGENT_ADDRESS: critic-agent:50054
      REPORT_SERVICE_ADDRESS: report-service:50055
    depends_on:
      postgres:
        condition: service_healthy
      planner-agent:
        condition: service_started
      search-agent:
        condition: service_started
      summarizer-agent:
        condition: service_started
      critic-agent:
        condition: service_started
      report-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: research
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  planner-agent:
    build:
      context: .
      dockerfile: services/planner-agent/Dockerfile
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-z-ai/glm-4.5-air:free}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
    ports:
      - "50051:50051"
    restart: on-failure

  search-agent:
    build:
      context: .
      dockerfile: services/search-agent/Dockerfile
    environment:
      TAVILY_API_KEY: ${TAVILY_API_KEY}
    ports:
      - "50052:50052"
    restart: on-failure

  summarizer-agent:
    build:
      context: .
      dockerfile: services/summarizer-agent/Dockerfile
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-z-ai/glm-4.5-air:free}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
    ports:
      - "50053:50053"
    restart: on-failure

  critic-agent:
    build:
      context: .
      dockerfile: services/critic-agent/Dockerfile
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-z-ai/glm-4.5-air:free}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
    ports:
      - "50054:50054"
    restart: on-failure

  report-service:
    build:
      context: .
      dockerfile: services/report-service/Dockerfile
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-z-ai/glm-4.5-air:free}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
    ports:
      - "50055:50055"
    restart: on-failure

volumes:
  postgres_data:
